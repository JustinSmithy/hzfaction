<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HZFaction Activity</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --bg:        #0a0c10;
    --surface:   #111318;
    --border:    #1e2230;
    --accent:    #00e5ff;
    --accent2:   #ff3d6b;
    --text:      #c8d0e0;
    --dim:       #505870;
    --green:     #00ff88;
    --radius:    6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.08) 2px,
      rgba(0,0,0,.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #fff;
  }

  header h1 span { color: var(--accent); }

  #status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'Share Tech Mono', monospace;
    font-size: .75rem;
    color: var(--dim);
  }

  #dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: background .4s;
  }
  #dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: auto 1fr;
    gap: 1px;
    background: var(--border);
  }

  /* ── sidebar ── */
  #sidebar {
    grid-row: 1 / 3;
    background: var(--surface);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: .65rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 8px;
  }

  #faction-list { display: flex; flex-direction: column; gap: 6px; }

  .faction-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius);
    background: rgba(255,255,255,.03);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .faction-card:hover, .faction-card.active {
    border-color: var(--accent);
    background: rgba(0,229,255,.05);
  }

  .faction-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .faction-tag {
    font-weight: 700;
    font-size: .95rem;
    letter-spacing: .06em;
    color: #fff;
    flex: 1;
  }

  .faction-online {
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem;
    color: var(--accent);
  }

  /* ── stats bar ── */
  #stats-bar {
    background: var(--surface);
    padding: 14px 24px;
    display: flex;
    gap: 32px;
    align-items: center;
    flex-wrap: wrap;
  }

  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.4rem;
    color: #fff;
  }
  .stat-lbl {
    font-size: .65rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--dim);
  }

  #last-update {
    margin-left: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: .72rem;
    color: var(--dim);
  }

  /* ── chart panel ── */
  #chart-panel {
    background: var(--bg);
    padding: 24px;
    position: relative;
    min-height: 380px;
  }

  #chart-panel canvas { width: 100% !important; }

  #no-data {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: .85rem;
    letter-spacing: .1em;
  }
  #no-data svg { opacity: .3; }

  /* ── footer ── */
  footer {
    text-align: center;
    padding: 10px;
    font-size: .65rem;
    letter-spacing: .12em;
    color: var(--dim);
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
</style>
</head>
<body>

<header>
  <h1>HZ<span>Faction</span> Activity</h1>
  <div id="status-pill">
    <div id="dot"></div>
    <span id="status-text">connecting…</span>
  </div>
</header>

<main>
  <!-- sidebar -->
  <aside id="sidebar">
    <div>
      <div class="sidebar-label">Factions</div>
      <div id="faction-list"><div style="color:var(--dim);font-size:.8rem">Loading…</div></div>
    </div>
  </aside>

  <!-- top stats bar -->
  <div id="stats-bar">
    <div class="stat">
      <span class="stat-val" id="stat-total">–</span>
      <span class="stat-lbl">Total Online</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-factions">–</span>
      <span class="stat-lbl">Active Factions</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-top">–</span>
      <span class="stat-lbl">Top Faction</span>
    </div>
    <div id="last-update">never updated</div>
  </div>

  <!-- chart -->
  <div id="chart-panel">
    <div id="no-data">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M3 3v18h18M7 16l4-4 4 4 4-6"/>
      </svg>
      Waiting for first data…
    </div>
    <canvas id="chart" style="display:none"></canvas>
  </div>
</main>

<footer>HZGFM · Activity Tracker · Real-time via WebSocket</footer>

<script>
// ── state ──────────────────────────────────────────────────────────────────
let chart = null
let colorMap = {}          // tag → hex string
let history = []           // [{timestamp, factions:[]}]
let highlightTag = null    // clicked faction tag

// ── utils ──────────────────────────────────────────────────────────────────
const hex2rgb = h => {
  h = h.replace('#','')
  const n = parseInt(h, 16)
  return [(n>>16)&255, (n>>8)&255, n&255]
}
const rgba = (hex, a) => { const [r,g,b] = hex2rgb(hex); return `rgba(${r},${g},${b},${a})` }
const toHex = h => h.startsWith('#') ? h : '#' + h
const fmtTime = iso => {
  const d = new Date(iso)
  return d.toLocaleDateString([], {month:'short',day:'numeric'}) + ' ' +
         d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
}

// collect unique tags across entire history (preserves order of first appearance)
const allTags = () => {
  const seen = new Set()
  history.forEach(s => s.factions.forEach(f => seen.add(f.tag)))
  return [...seen]
}

// ── sidebar ────────────────────────────────────────────────────────────────
function renderSidebar(factions) {
  const list = document.getElementById('faction-list')
  list.innerHTML = ''
  factions.sort((a,b) => b.online - a.online).forEach(f => {
    const hex = toHex(colorMap[f.tag] || 'ffffff')
    const card = document.createElement('div')
    card.className = 'faction-card' + (highlightTag === f.tag ? ' active' : '')
    card.innerHTML = `
      <div class="faction-dot" style="background:${hex}"></div>
      <span class="faction-tag">${f.tag}</span>
      <span class="faction-online">${f.online}</span>`
    card.onclick = () => {
      highlightTag = highlightTag === f.tag ? null : f.tag
      renderSidebar(factions)
      updateChart()
    }
    list.appendChild(card)
  })
}

// ── stats bar ──────────────────────────────────────────────────────────────
function renderStats(factions, timestamp) {
  const total = factions.reduce((s,f) => s+f.online, 0)
  const active = factions.filter(f => f.online > 0).length
  const top = factions.reduce((a,b) => a.online >= b.online ? a : b, {tag:'–',online:0})
  document.getElementById('stat-total').textContent = total
  document.getElementById('stat-factions').textContent = active
  document.getElementById('stat-top').textContent = top.tag
  if (timestamp)
    document.getElementById('last-update').textContent = 'Last update: ' + fmtTime(timestamp)
}

// ── chart ──────────────────────────────────────────────────────────────────
function buildDatasets() {
  const tags = highlightTag ? [highlightTag] : allTags()
  return tags.map(tag => {
    const hex = toHex(colorMap[tag] || 'ffffff')
    return {
      label: tag,
      data: history.map(snap => {
        const f = snap.factions.find(x => x.tag === tag)
        return f ? f.online : 0
      }),
      borderColor: hex,
      backgroundColor: rgba(hex, highlightTag === tag ? .15 : .08),
      borderWidth: highlightTag === tag ? 2.5 : 1.5,
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.3,
      fill: false,
    }
  })
}

function updateChart() {
  if (history.length === 0) return
  document.getElementById('no-data').style.display = 'none'
  const canvas = document.getElementById('chart')
  canvas.style.display = 'block'

  const labels = history.map(s => fmtTime(s.timestamp))
  const datasets = buildDatasets()

  if (!chart) {
    chart = new Chart(canvas, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        animation: { duration: 400 },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            labels: {
              color: '#c8d0e0',
              font: { family: 'Rajdhani', size: 13, weight: '600' },
              boxWidth: 20, boxHeight: 3,
              padding: 16,
              usePointStyle: false,
            }
          },
          tooltip: {
            backgroundColor: '#111318',
            borderColor: '#1e2230',
            borderWidth: 1,
            titleColor: '#fff',
            bodyColor: '#c8d0e0',
            titleFont: { family: 'Share Tech Mono', size: 12 },
            bodyFont:  { family: 'Rajdhani', size: 13 },
            padding: 12,
          }
        },
        scales: {
          x: {
            ticks: {
              color: '#505870',
              font: { family: 'Share Tech Mono', size: 10 },
              maxTicksLimit: 12,
              maxRotation: 45,
            },
            grid: { color: '#1e2230' }
          },
          y: {
            beginAtZero: true,
            ticks: {
              color: '#505870',
              font: { family: 'Share Tech Mono', size: 11 },
              stepSize: 1,
            },
            grid: { color: '#1e2230' }
          }
        }
      }
    })
  } else {
    chart.data.labels = labels
    chart.data.datasets = datasets
    chart.update('none')
  }
}

// ── load history ───────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch('/api/history?limit=200')
    history = await res.json()
    // build colorMap from history
    history.forEach(snap =>
      snap.factions.forEach(f => {
        if (f.color_hex) colorMap[f.tag] = f.color_hex
      })
    )
    if (history.length > 0) {
      const latest = history[history.length - 1]
      renderSidebar(latest.factions)
      renderStats(latest.factions, latest.timestamp)
      updateChart()
    }
  } catch(e) {
    console.error('history load failed', e)
  }
}

// ── websocket ──────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws'
  const ws = new WebSocket(`${proto}://${location.host}/ws`)

  ws.onopen = () => {
    document.getElementById('dot').classList.add('live')
    document.getElementById('status-text').textContent = 'live'
  }

  ws.onmessage = e => {
    const msg = JSON.parse(e.data)
    if (msg.event === 'snapshot') {
      // update colorMap
      msg.factions.forEach(f => {
        if (f.color_hex) colorMap[f.tag] = f.color_hex
      })
      // append to history (rolling 200)
      history.push({ timestamp: msg.timestamp, factions: msg.factions })
      if (history.length > 200) history.shift()

      renderSidebar(msg.factions)
      renderStats(msg.factions, msg.timestamp)
      updateChart()
    }
  }

  ws.onclose = () => {
    document.getElementById('dot').classList.remove('live')
    document.getElementById('status-text').textContent = 'reconnecting…'
    setTimeout(connectWS, 3000)
  }

  ws.onerror = () => ws.close()
}

// ── init ───────────────────────────────────────────────────────────────────
loadHistory().then(connectWS)
</script>
</body>
</html>
